# Hyprland config - dev & gaming focused

################
### MONITORS ###
################

monitor = HDMI-A-1, 3840x2160@120, 0x0, 1
monitor = , preferred, auto, auto


###################
### MY PROGRAMS ###
###################

$terminal = wezterm
$browser = firefox
$fileManager = dolphin
$menu = hyprlauncher
$discord = discord-wayland


#################
### AUTOSTART ###
#################

exec-once = uwsm finalize
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = swayosd-server
exec-once = hypridle
exec-once = [workspace special:btop silent] wezterm start -- btop


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# GTK theming
env = GTK_THEME,Adwaita-dark

# Gaming - better compatibility
env = WLR_DRM_NO_ATOMIC,1
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    col.active_border = rgba(d65d0eee) rgba(fe8019ee) 45deg
    col.inactive_border = rgba(3c3836aa)

    resize_on_border = true
    extend_border_grab_area = 15

    # Gaming - allows tearing for reduced input lag
    allow_tearing = true

    layout = dwindle
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        xray = false
    }
}

animations {
    enabled = true

    # Snappy animations for responsiveness
    bezier = snappy, 0.05, 0.9, 0.1, 1.0
    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 3, snappy, slide
    animation = windowsOut, 1, 3, snappy, slide
    animation = border, 1, 4, smooth
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, snappy, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = false
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
    allow_session_lock_restore = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us

    follow_mouse = 1
    mouse_refocus = false

    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}


####################
### KEYBINDINGS ###
####################

$mainMod = SUPER

# Application launchers
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/smart-terminal.sh
bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, ~/.config/hypr/scripts/smart-browser.sh
bind = $mainMod SHIFT, B, exec, $browser
bind = $mainMod, D, exec, ~/.config/hypr/scripts/go-app.sh discord 9 "discord-wayland"
bind = $mainMod, S, exec, ~/.config/hypr/scripts/go-app.sh spotify 8 "spotify"
bind = $mainMod, G, exec, ~/.config/hypr/scripts/go-app.sh steam 10 "steam"
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, RETURN, exec, $menu

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, ESCAPE, togglefloating,
bind = $mainMod SHIFT, ESCAPE, exec, hyprlock
bind = $mainMod, P, pseudo,
bind = $mainMod, backslash, layoutmsg, togglesplit
bind = $mainMod SHIFT, G, togglegroup,
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod ALT, W, exec, /home/admin/bin/game-mode.sh

# Focus - vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Focus - arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows - vim keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize windows
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, J, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpads
bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratchpad
bind = $mainMod, M, togglespecialworkspace, btop

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = SHIFT ALT, S, exec, grim -g "$(slurp)" - | wl-copy --type image/png
bind = $mainMod SHIFT ALT, S, exec, grim - | wl-copy --type image/png
bind = $mainMod SHIFT ALT, F, exec, grim -g "$(slurp)" ~/Pictures/$(date +%Y%m%d_%H%M%S).png
bind = CTRL SHIFT ALT, S, exec, ~/.config/hypr/scripts/claude-screenshot.sh

# Media keys
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Brightness with Mod + Volume keys
bindel = $mainMod, XF86AudioRaiseVolume, exec, swayosd-client --brightness raise
bindel = $mainMod, XF86AudioLowerVolume, exec, swayosd-client --brightness lower
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Spotify-specific controls with Shift modifier
bindl = SHIFT, XF86AudioPlay, exec, playerctl -p spotify play-pause
bindl = SHIFT, XF86AudioPause, exec, playerctl -p spotify play-pause
bindel = SHIFT, XF86AudioRaiseVolume, exec, playerctl -p spotify volume 0.05+
bindel = SHIFT, XF86AudioLowerVolume, exec, playerctl -p spotify volume 0.05-

# Firefox-specific controls with Ctrl+Shift modifier
bindel = CTRL SHIFT, XF86AudioRaiseVolume, exec, playerctl -p firefox volume 0.05+
bindel = CTRL SHIFT, XF86AudioLowerVolume, exec, playerctl -p firefox volume 0.05-
bind = $mainMod, KP_Add, exec, ~/.config/hypr/scripts/spotify-like.py  # Super + '+' (numpad)
bind = $mainMod, equal, exec, ~/.config/hypr/scripts/spotify-like.py   # Super + '=' (also triggers +)
bind = $mainMod SHIFT, equal, exec, ~/.config/hypr/scripts/spotify-like.py --playlist  # Super + Shift + '+' playlist picker
bind = $mainMod, minus, exec, ~/.config/hypr/scripts/spotify-like.py --unlike  # Super + '-'
bind = $mainMod, KP_Subtract, exec, ~/.config/hypr/scripts/spotify-like.py --unlike  # Super + '-' (numpad)
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/spotify-like.py --copy-link  # Super + Shift + S: copy song link
bind = $mainMod, I, exec, ~/.config/hypr/scripts/spotify-like.py --now-playing  # Super + I: now playing notification

# Audio output switching
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/switch-audio.sh astro
bind = $mainMod, F2, exec, ~/.config/hypr/scripts/switch-audio.sh airpods
bind = $mainMod, F3, exec, ~/.config/hypr/scripts/switch-audio.sh hdmi
bind = $mainMod, F4, exec, ~/.config/hypr/scripts/switch-audio.sh speakers

# Caffeine mode (toggle sleep inhibitor)
bind = $mainMod, C, exec, ~/.config/hypr/scripts/toggle-caffeine.sh

# Keybinding cheat sheet (toggle)
bind = $mainMod SHIFT, slash, exec, ~/.config/hypr/scripts/show-keybinds.sh

# Session
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod SHIFT, R, exec, hyprctl reload


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Suppress maximize (games love to do this)
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Gaming optimizations - immediate tearing for games
windowrule {
    name = gaming-immediate
    match:class = ^(steam_app_.*|gamescope|cs2|dota2)$
    immediate = true
    fullscreen = true
}

# Spotify - prevent fullscreen maximize
windowrule {
    name = spotify-suppress
    match:class = ^(spotify)$
    suppress_event = maximize, fullscreen
}

# Float common dialogs
windowrule {
    name = float-dialogs
    match:title = ^(Open File|Save File|Volume Control)$
    float = true
}

windowrule {
    name = float-utils
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor)$
    float = true
}

# Picture-in-picture
windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = true
    pin = true
    size = 640 360
    move = 100%-660 100%-380
}

# Fixed workspace assignments
windowrule {
    name = ws-spotify
    match:class = ^(spotify)$
    workspace = 8 silent
}

windowrule {
    name = ws-discord
    match:class = ^(discord)$
    workspace = 9 silent
}

windowrule {
    name = ws-steam
    match:class = ^(steam)$
    workspace = 10 silent
}

# btop scratchpad
windowrule {
    name = scratchpad-btop
    match:class = ^(btop)$
    workspace = special:btop
}

# Fix XWayland drag issues
windowrule {
    name = fix-xwayland
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    no_focus = true
}

